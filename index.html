<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Eco-Sort</title>

<style>
body{margin:0;font-family:Arial;background:#1e3c72;color:white;overflow:hidden;}
.screen{display:none;text-align:center;padding-top:50px;}
.active{display:block}
.container{display:flex;height:100vh;}
.side{flex:1;border-right:2px solid white;position:relative;}
.side:last-child{border:none;}
.hud{position:absolute;top:10px;left:10px;}
.item{margin-top:100px;font-size:22px;}

.bins{
position:fixed;bottom:0;width:100%;
display:flex;justify-content:center;gap:10px;
background:#000000aa;padding:10px;
}

.bin{
width:160px;height:80px;
line-height:18px;
padding-top:10px;
border-radius:10px;
cursor:pointer;
font-weight:bold;
text-align:center;
font-size:13px;
}

.bio{background:green;}
.nonbio{background:red;}
.recycle{background:blue;}

.falling{
position:absolute;
top:0;
background:#fff;color:#000;
padding:8px;border-radius:8px;
}

.trashcan{
position:absolute;
bottom:120px;
width:150px;height:60px;
background:#ff9800;
color:black;
font-weight:bold;
line-height:60px;
text-align:center;
border-radius:10px;
font-size:12px;
}

.controls{
position:fixed;
bottom:10px;
width:100%;
display:flex;
justify-content:space-between;
padding:0 10px;
}

.ctrlBtn{
width:45%;
height:80px;
font-size:22px;
border-radius:15px;
border:none;
background:#ffffffcc;
}

button{padding:10px 20px;margin:10px;border:none;border-radius:10px;}
</style>
</head>

<body>

<button id="muteBtn" onclick="toggleMute()" style="position:fixed;top:10px;right:10px;z-index:999;padding:10px 15px;border:none;border-radius:10px;background:white;font-weight:bold;cursor:pointer;">
🔊 Sound ON
</button>

<audio id="clickSound" src="click.mp3"></audio>
<audio id="correctSound" src="correct.mp3"></audio>
<audio id="wrongSound" src="wrong.mp3"></audio>
<audio id="lobbyMusic" src="lobby.mp3" loop></audio>
<audio id="gameMusic" src="game.mp3" loop></audio>
<audio id="gameOverSound" src="gameover.mp3"></audio>

<div id="s1" class="screen active">
<h1>♻️ EcoSort</h1>
<p>Rotate phone to <b>LANDSCAPE MODE</b></p>
<p>Sorting = Classify each waste item into the correct category | Falling = Catch only the correct type of waste while avoiding the wrong one</p>
<button onclick="startLobby(); next('Name')">Start</button>
</div>

<div id="sName" class="screen">
<input id="username" placeholder="Enter name"><br><br>
<button onclick="saveName()">Continue</button>
</div>

<div id="s2" class="screen">
<button onclick="setLevel(45)">Easy</button>
<button onclick="setLevel(30)">Medium</button>
<button onclick="setLevel(20)">Hard</button>
</div>

<div id="s3" class="screen">
<button onclick="setMode('sort')">Sorting</button>
<button onclick="next('fallSelect')">Falling</button>
</div>

<div id="sfallSelect" class="screen">
<button onclick="startFall('bio')">BIODEGRADABLE</button>
<button onclick="startFall('nonbio')">NON-BIODEGRADABLE</button>
<button onclick="startFall('recycle')">RECYCLABLE</button>
</div>

<div id="s4" class="screen">

<h3 id="direction"></h3>

<div class="container">
<div class="side">
<h2>YOU</h2>
<div class="hud">
<div id="scoreP">Score:0</div>
<div id="timer">Time:0</div>
</div>
<div id="itemP" class="item"></div>
</div>

<div class="side">
<h2>AI 🤖</h2>
<div class="hud">
<div id="scoreAI">AI:0</div>
</div>
<div id="itemAI" class="item"></div>
</div>
</div>

<div class="bins" id="bins">
<div class="bin bio" onclick="playerCheck('bio')">BIODEGRADABLE</div>
<div class="bin nonbio" onclick="playerCheck('nonbio')">NON-BIODEGRADABLE</div>
<div class="bin recycle" onclick="playerCheck('recycle')">RECYCLABLE</div>
</div>

<div id="controls" class="controls" style="display:none;">
<button class="ctrlBtn" onclick="moveLeft()">⬅</button>
<button class="ctrlBtn" onclick="moveRight()">➡</button>
</div>

</div>

<script>

/* DOM */
const timer=document.getElementById("timer");
const scoreP=document.getElementById("scoreP");
const scoreAI=document.getElementById("scoreAI");
const itemP=document.getElementById("itemP");
const itemAI=document.getElementById("itemAI");
const direction=document.getElementById("direction");

/* AUDIO */
let isMuted=false;
function toggleMute(){
isMuted=!isMuted;
muteBtn.innerText=isMuted?"🔇 Sound OFF":"🔊 Sound ON";
if(isMuted){lobbyMusic.pause();gameMusic.pause();}
}

function safePlay(a){if(!isMuted){a.currentTime=0;a.play().catch(()=>{});}}
function playClick(){safePlay(clickSound);}
function playCorrect(){safePlay(correctSound);}
function playWrong(){safePlay(wrongSound);}
function playGameOver(){safePlay(gameOverSound);}

function startLobby(){
if(!isMuted){lobbyMusic.volume=0.4;lobbyMusic.play().catch(()=>{});}
}

function startGameMusic(){
if(!isMuted){gameMusic.volume=0.4;gameMusic.currentTime=0;gameMusic.play().catch(()=>{});}
}

document.querySelectorAll("button").forEach(b=>b.addEventListener("click",playClick));

/* NAV */
function next(n){
document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
document.getElementById("s"+n).classList.add("active");
}

let playerName="";
function saveName(){
let n=username.value;
if(!n){alert("Enter name");return;}
playerName=n;
next(2);
}

/* GAME */
let time=30,score=0,aiScore=0,mode,current;
let timerInt,fallInterval,targetType;
let canP,canAI,xP,xAI;

/* DATA */
const make=(a,t)=>a.map(x=>({name:x,type:t}));

const bio=make(["banana peel","apple core","leftover rice","vegetable scraps","egg shells"],"bio");
const nonbio=make(["plastic bottle","plastic bag","candy wrapper","chip bag","straw"],"nonbio");
const recycle=make(["paper","notebook","newspaper","magazine","cardboard"],"recycle");

const waste=[...bio,...nonbio,...recycle];

function setLevel(t){time=t;next(3);}

function setMode(m){
mode=m;
lobbyMusic.pause();
startGameMusic();
startGame();
}

function startGame(){
score=0;
aiScore=0;

localStorage.removeItem("ecoSortSave"); // FIX

bins.style.display="flex";
controls.style.display="none";
next(4);
newRound();
startTimer();
startAI();
}

function startTimer(){
timer.innerText="Time:"+time;
timerInt=setInterval(()=>{
time--;
timer.innerText="Time:"+time;

if(time<=0){
clearInterval(timerInt);
clearInterval(fallInterval);
gameMusic.pause();
playGameOver();
setTimeout(()=>{alert("You:"+score+" AI:"+aiScore);location.reload();},1200);
}
},1000);
}

function newRound(){
current=waste[Math.random()*waste.length|0];
itemP.innerText=current.name;
itemAI.innerText=current.name;
}

function playerCheck(ans){
if(ans===current.type){score++;playCorrect();}
else{score--;playWrong();}
scoreP.innerText="Score:"+score;
newRound();
}

function startAI(){
clearInterval(window.aiInt);

window.aiInt=setInterval(()=>{
let guess=["bio","nonbio","recycle"][Math.random()*3|0];

if(current && guess===current.type){
aiScore++;
scoreAI.innerText="AI:"+aiScore;
}
},1200);
}

/* FALLING */
function startFall(type){
targetType=type;
lobbyMusic.pause();
startGameMusic();

bins.style.display="none";
controls.style.display="flex";
next(4);

startTimer();
startAI();

direction.innerText="Catch ONLY "+type.toUpperCase();

canP=document.createElement("div");
canP.className="trashcan";
canP.style.left="25%";
canP.innerText=type;
document.body.appendChild(canP);

canAI=document.createElement("div");
canAI.className="trashcan";
canAI.style.left="75%";
canAI.innerText=type;
document.body.appendChild(canAI);

xP=innerWidth*0.25;
xAI=innerWidth*0.75;

setInterval(()=>{
xAI+=Math.random()<0.5?-40:40;
canAI.style.left=xAI+"px";
},800);

fallInterval=setInterval(()=>{
let obj=waste[Math.random()*waste.length|0];

let div=document.createElement("div");
div.className="falling";
div.innerText=obj.name;
div.style.left=Math.random()*innerWidth+"px";
document.body.appendChild(div);

let y=0;
let move=setInterval(()=>{
y+=3;
div.style.top=y+"px";

if(y>innerHeight-150){

if(Math.abs(xP-div.offsetLeft)<80){
if(obj.type===targetType){score++;playCorrect();}
else{score--;playWrong();}
scoreP.innerText="Score:"+score;
}

if(Math.abs(xAI-div.offsetLeft)<80){
if(obj.type===targetType)aiScore++;
else aiScore--;
scoreAI.innerText="AI:"+aiScore;
}

div.remove();
clearInterval(move);
}
},50);
},1800);
}

function moveLeft(){xP-=40;canP.style.left=xP+"px";}
function moveRight(){xP+=40;canP.style.left=xP+"px";}

document.addEventListener("keydown",e=>{
if(e.key==="ArrowLeft")moveLeft();
if(e.key==="ArrowRight")moveRight();
});

</script>
</body>
</html>
