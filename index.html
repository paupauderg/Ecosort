<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>EcoSort</title>

<style>
body{margin:0;font-family:Arial;background:#1e3c72;color:white;overflow:hidden;}
.screen{display:none;text-align:center;padding-top:50px;}
.active{display:block}

.container{display:flex;height:100vh;}
.side{flex:1;border-right:2px solid white;position:relative;}
.side:last-child{border:none;}

.hud{position:absolute;top:10px;left:10px;}
.item{margin-top:100px;font-size:22px;}

.bins{
position:fixed;bottom:0;width:100%;
display:flex;justify-content:center;gap:10px;
background:#000000aa;padding:10px;
}

/* 🔧 LIIT FONT PARA KASYA */
.bin{
width:160px;height:70px;
line-height:20px;
padding-top:15px;
border-radius:10px;
cursor:pointer;
font-weight:bold;
text-align:center;
font-size:14px;
}

.bio{background:green;}
.nonbio{background:red;}
.recycle{background:blue;}

.falling{
position:absolute;
top:0;
background:#fff;color:#000;
padding:8px;border-radius:8px;
}

.trashcan{
position:fixed;
bottom:90px;
left:50%;
transform:translateX(-50%);
width:170px;height:60px;
background:#ff9800;
color:black;
font-weight:bold;
line-height:60px;
text-align:center;
border-radius:10px;
font-size:13px;
}

button{padding:10px 20px;margin:10px;border:none;border-radius:10px;}
</style>
</head>

<body>

<div id="s1" class="screen active">
<h1>♻️ EcoSort</h1>
<button onclick="next('Name')">Start</button>
</div>

<div id="sName" class="screen">
<h2>Enter Name</h2>
<input id="username">
<br><br>
<button onclick="saveName()">Continue</button>
</div>

<div id="s2" class="screen">
<button onclick="setLevel(45)">Easy</button>
<button onclick="setLevel(30)">Medium</button>
<button onclick="setLevel(20)">Hard</button>
</div>

<div id="s3" class="screen">
<button onclick="setMode('sort')">Sorting</button>
<button onclick="setMode('quiz')">Quiz</button>
<button onclick="next('fallSelect')">Falling</button>
</div>

<div id="sfallSelect" class="screen">
<h2>Select Target</h2>
<button onclick="startFall('bio')">BIODEGRADABLE</button>
<button onclick="startFall('nonbio')">NON-BIODEGRADABLE</button>
<button onclick="startFall('recycle')">RECYCLABLE</button>
</div>

<div id="s4" class="screen">

<h3 id="direction"></h3>

<div class="container">

<div class="side">
<h2>YOU</h2>
<div class="hud">
<div id="scoreP">Score:0</div>
<div id="timer">Time:0</div>
</div>
<div id="itemP" class="item"></div>
</div>

<div class="side">
<h2>AI 🤖</h2>
<div class="hud">
<div id="scoreAI">AI:0</div>
</div>
<div id="itemAI" class="item"></div>
</div>

</div>

<div class="bins" id="bins">
<div class="bin bio" onclick="playerCheck('bio')">BIODEGRADABLE</div>
<div class="bin nonbio" onclick="playerCheck('nonbio')">NON-BIODEGRADABLE</div>
<div class="bin recycle" onclick="playerCheck('recycle')">RECYCLABLE</div>
</div>

</div>

<script>

function next(n){
document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
document.getElementById("s"+n).classList.add("active");
}

let playerName="";
function saveName(){
let n=document.getElementById("username").value;
if(!n){alert("Enter name");return;}
playerName=n;
next(2);
}

let time=30,score=0,aiScore=0,mode,current;
let timerInt,fallInterval,targetType;

const make = (arr,type)=>arr.map(x=>({name:x,type:type}));

const bio = make([
"banana peel","apple core","leftover rice","vegetable scraps","egg shells","coffee grounds","tea bag","bread","fruit peel","fish bones",
"chicken bones","spoiled food","leaf","grass","flower","plant stem","fruit seeds","paper napkin","tissue","food waste",
"vegetable peel","fruit skin","organic waste","compost","garden waste","weeds","flower petals","banana leaf","corn husk","coconut shell",
"peanut shells","fruit core","tree leaves","plant roots","soil","food leftovers","rice husk","tea leaves","vegetable stem","spoiled fruit",
"organic scraps","paper plate","biodegradable bag","plant waste","natural fiber","food crumbs","fruit pulp","leaf litter","organic trash","plant waste"
],"bio");

const nonbio = make([
"plastic bottle","plastic bag","candy wrapper","chip bag","straw","styrofoam","plastic spoon","plastic fork","cup lid","bubble wrap",
"snack wrapper","juice pouch","milk carton","plastic cover","old pen","broken ruler","plastic cup","plastic plate","wrapper","plastic film",
"rubber band","tape","plastic string","polybag","plastic packaging","old toothbrush","plastic case","plastic toy","hard plastic","soft plastic",
"plastic container","disposable cup","plastic lid","plastic scrap","plastic trash","synthetic waste","plastic piece","plastic debris","plastic fragments","plastic waste",
"food wrapper","instant noodles cup","plastic sheet","plastic material","broken plastic","plastic parts","plastic junk","garbage plastic","waste plastic","plastic residue"
],"nonbio");

const recycle = make([
"paper","notebook","newspaper","magazine","cardboard","carton box","paper bag","bond paper","old book","folder",
"envelope","clean paper","glass bottle","glass jar","aluminum can","tin can","metal lid","foil","clean container","plastic bottle (clean)",
"paper cup","egg tray","carton packaging","paper wrapper","office paper","scratch paper","clean carton","clean bottle","glass container","metal can",
"aluminum foil","clean plastic","recyclable plastic","paper roll","cardboard box","paper sheet","reusable paper","clean packaging","glass scrap","metal scrap",
"clean wrapper","recycle material","clean cup","clean can","clean jar","paper scrap","recyclable waste","clean paper bag","clean box","recycle item"
],"recycle");

const waste=[...bio,...nonbio,...recycle];

const quiz=[
...bio.map(x=>({q:x.name+" belongs to?",a:"bio"})),
...nonbio.map(x=>({q:x.name+" belongs to?",a:"nonbio"})),
...recycle.map(x=>({q:x.name+" belongs to?",a:"recycle"}))
];

function setLevel(t){time=t;next(3);}
function setMode(m){mode=m;startGame();}

function startGame(){
score=0;aiScore=0;
document.getElementById("bins").style.display="flex";
next(4);
newRound();
startTimer();
}

function startTimer(){
timer.innerText="Time:"+time;
timerInt=setInterval(()=>{
time--;
timer.innerText="Time:"+time;
if(time<=0){
clearInterval(timerInt);
clearInterval(fallInterval);
alert(playerName+" Score:"+score);
location.reload();
}
},1000);
}

function newRound(){
if(mode==="sort"){
current=waste[Math.random()*waste.length|0];
itemP.innerText=current.name;
itemAI.innerText=current.name;
}
if(mode==="quiz"){
current=quiz[Math.random()*quiz.length|0];
itemP.innerText=current.q;
itemAI.innerText=current.q;
}
}

function startFall(type){
targetType=type;
document.getElementById("bins").style.display="none";
next(4);

direction.innerText="Catch only "+type.toUpperCase();

let can=document.createElement("div");
can.className="trashcan";
can.innerText=type.toUpperCase();
document.body.appendChild(can);

let x=window.innerWidth/2;
document.addEventListener("keydown",(e)=>{
if(e.key==="ArrowLeft") x-=40;
if(e.key==="ArrowRight") x+=40;
can.style.left=x+"px";
});

fallInterval=setInterval(()=>{
let obj=waste[Math.random()*waste.length|0];

let div=document.createElement("div");
div.className="falling";
div.innerText=obj.name;
div.style.left=Math.random()*window.innerWidth+"px";
document.body.appendChild(div);

let y=0;
let move=setInterval(()=>{
y+=6;
div.style.top=y+"px";

if(y>window.innerHeight-150){

let canX=can.getBoundingClientRect().left;
let objX=div.getBoundingClientRect().left;

if(Math.abs(canX-objX)<100){
if(obj.type===targetType){score++;}
else{score--;}
scoreP.innerText="Score:"+score;
}

div.remove();
clearInterval(move);
}
},50);

},1200);

startTimer();
}

function playerCheck(ans){
let correct=current.type || current.a;
if(ans===correct){score++;}
else{score--;}
scoreP.innerText="Score:"+score;
newRound();
}

</script>

</body>
</html>
