<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>EcoSort</title>

<style>
body{
margin:0;
font-family:Arial;
background:#1e3c72;
color:white;
overflow:hidden;
}

.screen{display:none;text-align:center;padding-top:50px;}
.active{display:block}

.container{display:flex;height:100vh;}

.side{
flex:1;
border-right:2px solid white;
position:relative;
}
.side:last-child{border:none;}

.hud{
position:absolute;
top:10px;
left:10px;
}

.item{
margin-top:100px;
font-size:22px;
text-align:center;
}

/* bins always visible */
.bins{
position:fixed;
bottom:0;
left:0;
width:100%;
display:flex;
justify-content:center;
gap:10px;
background:#000000aa;
padding:10px;
z-index:999;
}

.bin{
width:140px;
height:70px;
line-height:70px;
border-radius:10px;
cursor:pointer;
font-weight:bold;
text-align:center;
}

.bio{background:green;}
.nonbio{background:red;}
.recycle{background:blue;}

/* falling */
.falling{
position:absolute;
top:0;
left:50%;
transform:translateX(-50%);
font-size:18px;
background:#fff;
color:#000;
padding:8px;
border-radius:8px;
}

button{
padding:10px 20px;
margin:10px;
border:none;
border-radius:10px;
cursor:pointer;
}
</style>
</head>

<body>

<!-- START -->
<div id="s1" class="screen active">
<h1>♻️ EcoSort</h1>
<button onclick="next(2)">Start</button>
</div>

<!-- LEVEL -->
<div id="s2" class="screen">
<button onclick="setLevel(45)">Easy</button>
<button onclick="setLevel(30)">Medium</button>
<button onclick="setLevel(20)">Hard</button>
</div>

<!-- MODE -->
<div id="s3" class="screen">
<button onclick="setMode('sort')">Sorting</button>
<button onclick="setMode('quiz')">Quiz</button>
<button onclick="setMode('fall')">Falling</button>
</div>

<!-- GAME -->
<div id="s4" class="screen">

<h3 id="direction"></h3>

<div class="container">

<div class="side">
<h2>YOU</h2>

<div class="hud">
<div id="scoreP">Score:0</div>
<div id="timer">Time:0</div>
</div>

<div id="itemP" class="item"></div>
<div id="extraP"></div>
</div>

<div class="side">
<h2>AI 🤖</h2>

<div class="hud">
<div id="scoreAI">AI:0</div>
<div id="aiAction"></div>
</div>

<div id="itemAI" class="item"></div>
</div>

</div>

<!-- BINS -->
<div class="bins">
<div class="bin bio" onclick="playerCheck('biodegradable')">BIODEGRADABLE</div>
<div class="bin nonbio" onclick="playerCheck('non-biodegradable')">NON-BIODEGRADABLE</div>
<div class="bin recycle" onclick="playerCheck('recyclable')">RECYCLABLE</div>
</div>

</div>

<script>

function next(n){
document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
document.getElementById("s"+n).classList.add("active");
}

let time=30, timerInt;
let mode="sort";
let score=0, aiScore=0;
let current;
let fallInterval;

/* 🔥 REAL 50 ITEMS EACH */

// BIO (50)
const bio=[
"Banana Peel","Apple Core","Leaves","Grass","Food Waste","Vegetable Scraps","Eggshells","Fruit Peels","Coffee Grounds","Tea Bags",
"Bread","Rice","Corn Husks","Flower Waste","Twigs","Branches","Wood Chips","Paper Napkin","Cardboard Food Box","Coconut Shell",
"Peanut Shell","Onion Skin","Garlic Skin","Fish Bones","Meat Scraps","Chicken Bones","Spoiled Food","Rotten Fruits","Rotten Vegetables","Seaweed",
"Sawdust","Dry Leaves","Wet Leaves","Plant Roots","Herbs","Grass Clippings","Compost","Tree Bark","Vegetable Peels","Fruit Seeds",
"Pumpkin Skin","Potato Peels","Sugarcane Waste","Banana Leaves","Plant Waste","Organic Soil","Garden Waste","Fruit Pulp","Flower Petals","Biodegradable Plate"
];

// NONBIO (50)
const nonbio=[
"Plastic Bottle","Plastic Bag","Styrofoam","Candy Wrapper","Chip Bag","Plastic Straw","Plastic Cup","Broken Glass","Ceramic","Rubber",
"Old Shoes","Plastic Spoon","Plastic Fork","Plastic Plate","Plastic Container","Packaging Plastic","Bubble Wrap","CD Disc","DVD","Tire",
"Broken Toys","Sachet","Plastic Lid","Plastic Wrapper","Foam","Plastic Packaging","Synthetic Cloth","Nylon","Plastic Rope","Old Electronics",
"Battery","Light Bulb","Wire","Cable","Plastic Tube","Plastic Cap","Disposable Mask","Gloves","Plastic Film","Plastic Net",
"Plastic Sheet","Plastic Box","Broken Plastic Chair","Plastic Tray","Plastic Bottle Cap","Plastic Case","Plastic Basket","Plastic Frame","Plastic Toy","Plastic Brush"
];

// RECYCLE (50)
const recycle=[
"Paper","Newspaper","Magazine","Notebook","Cardboard","Carton Box","Glass Bottle","Aluminum Can","Tin Can","Steel Can",
"Paper Bag","Office Paper","Bond Paper","Carton","Egg Carton","Milk Carton","Juice Box","Glass Jar","Wine Bottle","Beer Bottle",
"Scrap Paper","Old Books","Packaging Box","Paper Tube","Paper Roll","Paper Envelope","Plastic Bottle Clean","Plastic Container Clean","Glass Cup","Glass Plate",
"Metal Scrap","Steel Rod","Iron Sheet","Cans","Boxboard","Paperboard","Recycled Paper","Plastic Jug","Plastic Drum","Plastic Bin",
"Glass Container","Tin Box","Metal Lid","Aluminum Foil","Paper Wrapper Clean","Clean Carton","Reusable Bottle","Reusable Container","Paper Packaging","Card Stock"
];

const waste=[
...bio.map(x=>({name:x,type:"biodegradable"})),
...nonbio.map(x=>({name:x,type:"non-biodegradable"})),
...recycle.map(x=>({name:x,type:"recyclable"}))
];

const quiz=[
{q:"Plastic belongs to?",a:"non-biodegradable"},
{q:"Banana peel is?",a:"biodegradable"},
{q:"Paper is?",a:"recyclable"}
];

function setLevel(t){time=t;next(3);}
function setMode(m){mode=m;startGame();}

function startGame(){
score=0; aiScore=0;
next(4);
setDirection();
newRound();
startTimer();
startAI();
}

function setDirection(){
if(mode==="sort") direction.innerText="Sort the waste.";
if(mode==="quiz") direction.innerText="Answer the question.";
if(mode==="fall") direction.innerText="Falling waste! Click correct bin!";
}

function startTimer(){
timer.innerText="Time:"+time;
timerInt=setInterval(()=>{
time--;
timer.innerText="Time:"+time;
if(time<=0){
clearInterval(timerInt);
clearInterval(fallInterval);
alert("Game Over\nYou:"+score+"\nAI:"+aiScore);
location.reload();
}
},1000);
}

function newRound(){

extraP.innerHTML="";

if(mode==="sort"){
current=waste[Math.random()*waste.length|0];
itemP.innerText=current.name;
itemAI.innerText=current.name;
}

if(mode==="quiz"){
let q=quiz[Math.random()*quiz.length|0];
current=q;
itemP.innerText=q.q;
itemAI.innerText=q.q;

extraP.innerHTML=`
<button onclick="playerCheck('biodegradable')">Biodegradable</button>
<button onclick="playerCheck('non-biodegradable')">Non-Biodegradable</button>
<button onclick="playerCheck('recyclable')">Recyclable</button>`;
}

if(mode==="fall"){
startFalling();
}
}

/* 🔥 REAL FALLING ANIMATION */
function startFalling(){

clearInterval(fallInterval);

let div=document.createElement("div");
div.className="falling";
document.body.appendChild(div);

fallInterval=setInterval(()=>{

let obj=waste[Math.random()*waste.length|0];
current=obj;
div.innerText=obj.name;

let y=0;

let move=setInterval(()=>{
y+=5;
div.style.top=y+"px";

if(y>window.innerHeight-150){
clearInterval(move);
y=0;
}
},50);

},1500);
}

function playerCheck(ans){
if(ans===current.type || ans===current.a){
score++;
}
scoreP.innerText="Score:"+score;

if(mode!=="fall") newRound();
}

function startAI(){
setInterval(()=>{
let c=["bio","nonbio","recycle"][Math.random()*3|0];
aiAction.innerText="AI:"+c;

if(c===current.type || c===current.a){
aiScore++;
}
scoreAI.innerText="AI:"+aiScore;

},1200);
}

</script>

</body>
</html>
